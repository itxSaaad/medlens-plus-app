# Branch Protection Configuration
# This file documents branch protection for the MedLens+ repository.
#
# Apply via: bash .github/setup-branch-protection.sh
# Docs: docs/ops/BRANCH_PROTECTION_SETUP.md
#
# Rulesets (with github-actions bypass for sync-develop.yml) are the source of
# truth for automated fast-forward. Classic protection mirrors the same policy.

branches:
  main:
    protection:
      required_status_checks:
        strict: true
        contexts:
          - "Branch Naming Validation"
          - "JS Quality - Lint Typecheck Test Build"
          - "Python Quality - Ruff Mypy Pytest"
          - "Commit And PR Convention Checks"
      required_pull_request_reviews:
        dismiss_stale_reviews: true
        require_code_owner_reviews: true
        require_last_push_approval: true
        required_approving_review_count: 1
      required_conversation_resolution: true
      required_linear_history: true
      restrictions: null
      enforce_admins: false # repo owner (@itxSaaad) may self-merge; collaborators still need CODEOWNERS approval
      allow_force_pushes: false
      allow_deletions: false
      allow_auto_merge: false
      delete_branch_on_merge: true
    ruleset:
      name: Protected branch main
      bypass_actors:
        - actor_type: Integration
          actor_id: 15368 # github-actions[bot]
          bypass_mode: always
        - actor_type: User
          actor_login: itxSaaad # sole CODEOWNER; owner self-merge bypass (best-effort in rulesets)
          bypass_mode: always

  develop:
    protection:
      required_status_checks:
        strict: true
        contexts:
          - "Branch Naming Validation"
          - "JS Quality - Lint Typecheck Test Build"
          - "Python Quality - Ruff Mypy Pytest"
          - "Commit And PR Convention Checks"
      required_pull_request_reviews:
        dismiss_stale_reviews: true
        require_code_owner_reviews: true
        require_last_push_approval: true
        required_approving_review_count: 1
      required_conversation_resolution: true
      required_linear_history: false
      restrictions: null
      enforce_admins: false # repo owner (@itxSaaad) may self-merge; collaborators still need CODEOWNERS approval
      allow_force_pushes: false
      allow_deletions: false
      allow_auto_merge: false
      delete_branch_on_merge: true
    ruleset:
      name: Protected branch develop
      bypass_actors:
        - actor_type: Integration
          actor_id: 15368 # github-actions[bot]
          bypass_mode: always
        - actor_type: User
          actor_login: itxSaaad # sole CODEOWNER; owner self-merge bypass (best-effort in rulesets)
          bypass_mode: always

# CODEOWNERS: @itxSaaad only — collaborator PRs require owner approval; owner may self-merge (enforce_admins: false).
