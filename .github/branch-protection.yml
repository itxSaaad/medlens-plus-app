# Branch Protection Configuration
# This file documents the branch protection rules for the MedLens+ repository.
#
# These rules are managed via GitHub settings and the GitHub CLI (gh).
# To apply these rules, see: docs/ops/BRANCH_PROTECTION_SETUP.md
# Or on Unix: .github/setup-branch-protection.sh
#
# Rules are applied to branches: main, staging, develop

branches:
  main:
    protection:
      required_status_checks:
        strict: true
        contexts:
          - "Branch Naming Validation"
          - "JS Quality - Lint Typecheck Test Build"
          - "Python Quality - Ruff Mypy Pytest"
          - "Commit And PR Convention Checks"
          - "Graphify Sync"
      # TODO(solo-maintainer): Re-enable when a second reviewer exists:
      #   require_code_owner_reviews: true
      #   required_approving_review_count: 1   # was 2
      required_pull_request_reviews:
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
        require_last_push_approval: false
        required_approving_review_count: 0
      restrictions: null
      enforce_admins: false
      allow_force_pushes: false
      allow_deletions: false
      allow_auto_merge: false
      delete_branch_on_merge: true

  staging:
    protection:
      required_status_checks:
        strict: true
        contexts:
          - "Branch Naming Validation"
          - "JS Quality - Lint Typecheck Test Build"
          - "Python Quality - Ruff Mypy Pytest"
          - "Commit And PR Convention Checks"
          - "Graphify Sync"
      # TODO(solo-maintainer): Re-enable when a second reviewer exists:
      #   require_code_owner_reviews: true
      #   required_approving_review_count: 1
      required_pull_request_reviews:
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
        require_last_push_approval: false
        required_approving_review_count: 0
      restrictions: null
      enforce_admins: false
      allow_force_pushes: false
      allow_deletions: false
      allow_auto_merge: false
      delete_branch_on_merge: true

  develop:
    protection:
      required_status_checks:
        strict: true
        contexts:
          - "Branch Naming Validation"
          - "JS Quality - Lint Typecheck Test Build"
          - "Python Quality - Ruff Mypy Pytest"
          - "Commit And PR Convention Checks"
          - "Graphify Sync"
      # TODO(solo-maintainer): Re-enable when a second reviewer exists:
      #   require_code_owner_reviews: true
      #   required_approving_review_count: 1
      required_pull_request_reviews:
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
        require_last_push_approval: false
        required_approving_review_count: 0
      restrictions: null
      enforce_admins: false
      allow_force_pushes: false
      allow_deletions: false
      allow_auto_merge: false
      delete_branch_on_merge: true

# CODEOWNERS file (.github/CODEOWNERS) remains for future use.
# While require_code_owner_reviews is false, solo maintainer merges via PR + CI only.
# Auto-merge is disabled; every merge requires explicit human action on the PR.
# Delete head branch on merge to maintain branch hygiene.
