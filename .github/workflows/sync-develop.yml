name: Sync Develop To Main

on:
  workflow_run:
    workflows: ["Release - Semantic Versioning And Tags"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-develop-to-main
  cancel-in-progress: false

jobs:
  sync:
    name: Align develop with main
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event.workflow_run.conclusion == 'success'
          && github.event.workflow_run.head_branch == 'main')
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Evaluate branch state
        id: state
        run: |
          git fetch origin main develop
          while IFS= read -r line; do
            echo "$line" >> "$GITHUB_OUTPUT"
          done < <(bash .github/scripts/evaluate-branch-sync.sh origin/main origin/develop)

      - name: Fast-forward develop to main
        if: steps.state.outputs.action == 'fast_forward'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          MAIN_SHA: ${{ steps.state.outputs.main_sha }}
        run: |
          # shellcheck source=/dev/null
          source .github/scripts/github-api.sh

          echo "Trees match; aligning develop to main ($MAIN_SHA)"
          PAYLOAD=$(jq -n --arg sha "$MAIN_SHA" '{sha: $sha, force: false}')

          if github_api PATCH "/repos/${GITHUB_REPOSITORY}/git/refs/heads/develop" \
            -H "Content-Type: application/json" \
            --data-binary "$PAYLOAD" 2>/tmp/sync-develop-ff.err; then
            echo "Fast-forwarded develop to main"
            exit 0
          fi

          if ! grep -qi "not a fast forward" /tmp/sync-develop-ff.err; then
            cat /tmp/sync-develop-ff.err >&2
            exit 1
          fi

          echo "Graph-only drift after squash promotion; resetting develop ref (trees match)"
          FORCE_PAYLOAD=$(jq -n --arg sha "$MAIN_SHA" '{sha: $sha, force: true}')
          github_api PATCH "/repos/${GITHUB_REPOSITORY}/git/refs/heads/develop" \
            -H "Content-Type: application/json" \
            --data-binary "$FORCE_PAYLOAD"

      - name: Open or update hotfix propagation PR
        if: steps.state.outputs.action == 'hotfix_pr'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          MAIN_AHEAD: ${{ steps.state.outputs.main_ahead }}
        run: |
          # shellcheck source=/dev/null
          source .github/scripts/github-api.sh

          OWNER="${GITHUB_REPOSITORY%%/*}"
          TITLE="chore: propagate main hotfixes to develop"
          BODY="## Hotfix propagation

          \`main\` is **${MAIN_AHEAD}** commit(s) ahead of \`develop\` with a non-empty diff.

          Merge this PR to bring hotfix changes into \`develop\`. Do **not** use this PR after a squash promotion when trees already match — the sync workflow fast-forwards \`develop\` instead.

          See \`docs/open-source/BRANCHING_STRATEGY.md\`.
          "

          EXISTING=$(github_api GET "/repos/${GITHUB_REPOSITORY}/pulls?base=develop&head=${OWNER}:main&state=open" \
            | jq -r '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            github_api POST "/repos/${GITHUB_REPOSITORY}/issues/${EXISTING}/comments" \
              -H "Content-Type: application/json" \
              --data-binary "$(jq -n --arg body "$BODY" '{body: $body}')"
            echo "Updated hotfix propagation PR #${EXISTING}"
          else
            CREATE_PAYLOAD=$(jq -n \
              --arg title "$TITLE" \
              --arg body "$BODY" \
              --arg head "main" \
              --arg base "develop" \
              '{title: $title, body: $body, head: $head, base: $base}')
            PR=$(github_api POST "/repos/${GITHUB_REPOSITORY}/pulls" \
              -H "Content-Type: application/json" \
              --data-binary "$CREATE_PAYLOAD")
            PR_NUMBER=$(echo "$PR" | jq -r '.number')
            echo "Opened hotfix propagation PR #${PR_NUMBER}"
          fi

      - name: Log promotion reminder
        if: steps.state.outputs.action == 'promotion_needed'
        run: |
          echo "develop is ahead with unpromoted work; open a develop -> main promotion PR."
          echo "dev_ahead=${{ steps.state.outputs.dev_ahead }}"

      - name: Sync summary
        run: |
          {
            echo "## Sync develop"
            echo "- action: ${{ steps.state.outputs.action }}"
            echo "- trees_match: ${{ steps.state.outputs.trees_match }}"
            echo "- develop ahead: ${{ steps.state.outputs.dev_ahead }}"
            echo "- main ahead: ${{ steps.state.outputs.main_ahead }}"
          } >> "$GITHUB_STEP_SUMMARY"
