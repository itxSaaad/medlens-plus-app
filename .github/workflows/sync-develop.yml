name: Sync Develop To Main

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-develop-to-main
  cancel-in-progress: false

jobs:
  sync:
    name: Align develop with main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Evaluate branch state
        id: state
        run: |
          git fetch origin main develop
          while IFS= read -r line; do
            echo "$line" >> "$GITHUB_OUTPUT"
          done < <(bash .github/scripts/evaluate-branch-sync.sh origin/main origin/develop)

      - name: Open or update backmerge PR
        if: steps.state.outputs.action == 'fast_forward' || steps.state.outputs.action == 'hotfix_pr'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          MAIN_AHEAD: ${{ steps.state.outputs.main_ahead }}
          SYNC_ACTION: ${{ steps.state.outputs.action }}
        run: |
          # shellcheck source=/dev/null
          source .github/scripts/github-api.sh

          OWNER="${GITHUB_REPOSITORY%%/*}"

          # develop's branch protection forbids force-pushes, so `develop` can
          # never be fast-forwarded directly by automation. Both drift cases
          # (graph-only, post squash-promotion; and hotfix, real diff) resolve
          # the same way: a human-reviewed PR merged with "Rebase and merge"
          # (never squash, never a merge commit). A merge commit here would
          # permanently block future develop -> main promotions from being
          # rebaseable -- GitHub's rebase-merge refuses to rebase any range
          # containing a merge commit, so one merge-commit backmerge poisons
          # every promotion after it. Rebase keeps every commit linear on
          # both branches, so develop -> main promotion can keep
          # fast-forwarding indefinitely (see BRANCHING_STRATEGY.md).
          if [ "$SYNC_ACTION" = "fast_forward" ]; then
            TITLE="chore: sync develop with main (post-promotion)"
            REASON="Graph-only drift after a squash promotion to \`main\` — file trees already match, this PR has an empty diff and exists only to align commit ancestry."
          else
            TITLE="chore: propagate main hotfixes to develop"
            REASON="\`main\` is **${MAIN_AHEAD}** commit(s) ahead of \`develop\` with a real (non-empty) diff — likely a hotfix merged directly to \`main\`."
          fi

          BODY="## Backmerge: main -> develop

          ${REASON}

          **Merge this PR with \"Rebase and merge\" — never squash, never a merge commit.** A merge commit here would permanently block future \`develop\` -> \`main\` promotions from fast-forwarding (GitHub's rebase-merge can't rebase a range containing a merge commit). Squashing recreates the original drift this workflow exists to prevent.

          See \`docs/open-source/BRANCHING_STRATEGY.md\`.
          "

          EXISTING=$(github_api GET "/repos/${GITHUB_REPOSITORY}/pulls?base=develop&head=${OWNER}:main&state=open" \
            | jq -r '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            github_api POST "/repos/${GITHUB_REPOSITORY}/issues/${EXISTING}/comments" \
              -H "Content-Type: application/json" \
              --data-binary "$(jq -n --arg body "$BODY" '{body: $body}')"
            echo "Updated backmerge PR #${EXISTING}"
          else
            CREATE_PAYLOAD=$(jq -n \
              --arg title "$TITLE" \
              --arg body "$BODY" \
              --arg head "main" \
              --arg base "develop" \
              '{title: $title, body: $body, head: $head, base: $base}')
            PR=$(github_api POST "/repos/${GITHUB_REPOSITORY}/pulls" \
              -H "Content-Type: application/json" \
              --data-binary "$CREATE_PAYLOAD")
            PR_NUMBER=$(echo "$PR" | jq -r '.number')
            echo "Opened backmerge PR #${PR_NUMBER}"
          fi

      - name: Log promotion reminder
        if: steps.state.outputs.action == 'promotion_needed'
        run: |
          echo "develop is ahead with unpromoted work; open a develop -> main promotion PR."
          echo "dev_ahead=${{ steps.state.outputs.dev_ahead }}"

      - name: Sync summary
        run: |
          {
            echo "## Sync develop"
            echo "- action: ${{ steps.state.outputs.action }}"
            echo "- trees_match: ${{ steps.state.outputs.trees_match }}"
            echo "- develop ahead: ${{ steps.state.outputs.dev_ahead }}"
            echo "- main ahead: ${{ steps.state.outputs.main_ahead }}"
          } >> "$GITHUB_STEP_SUMMARY"
