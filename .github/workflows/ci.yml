name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [main, develop, staging]
  push:
    branches: [main, develop, staging]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js-quality:
    name: JS Quality (lint, typecheck, unit test, build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (frontend + markdown)
        run: |
          pnpm --filter @medlens/web lint
          pnpm lint:md

      - name: Typecheck (frontend + shared types)
        run: |
          pnpm --filter @medlens/web typecheck
          pnpm --filter @medlens/types typecheck

      - name: Unit tests (frontend)
        run: pnpm --filter @medlens/web test:unit

      - name: Build (frontend)
        run: pnpm --filter @medlens/web build

  python-quality:
    name: Python Quality (ruff, mypy, unit tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install python dependencies
        run: uv sync --directory apps/api --frozen --group dev

      - name: Ruff
        run: uv run --directory apps/api ruff check .

      - name: Mypy
        run: uv run --directory apps/api mypy src

      - name: Unit tests (api)
        run: uv run --directory apps/api pytest -m "not integration"

  commitlint:
    name: Commit Message Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Lint commits
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.cjs
