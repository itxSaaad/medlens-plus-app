name: CI - Quality And Governance

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited, closed]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-naming:
    name: Branch Naming Validation
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request'
      && github.event.action != 'closed'
      && github.event.action != 'edited'
    steps:
      - name: Validate source branch naming convention
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          echo "Validating branch: $BRANCH_NAME"
          if [[ "$BRANCH_NAME" =~ ^main$ ]]; then
            echo "Bypassing naming validation for permanent branch: $BRANCH_NAME"
            exit 0
          fi
          if [[ "$BRANCH_NAME" =~ ^dependabot/ ]]; then
            echo "Bypassing naming validation for Dependabot branch: $BRANCH_NAME"
            exit 0
          fi
          if [[ ! "$BRANCH_NAME" =~ ^(feat|fix|hotfix|chore|docs|refactor|test|ci|release)\/ ]]; then
            echo "Invalid branch name: $BRANCH_NAME"
            echo "Use one of: feat/*, fix/*, hotfix/*, chore/*, docs/*, refactor/*, test/*, ci/*, release/*"
            exit 1
          fi
          if [[ "$BRANCH_NAME" =~ ^(feat|fix|hotfix)/ ]]; then
            TICKET_PATTERN='^(feat|fix|hotfix)/TKT-[0-9]+(\.[0-9]+)?-[a-z0-9]+(-[a-z0-9]+)*$'
            SLUG_PATTERN='^(feat|fix|hotfix)/[a-z0-9]+(-[a-z0-9]+)*$'
            if [[ ! "$BRANCH_NAME" =~ $TICKET_PATTERN ]] && [[ ! "$BRANCH_NAME" =~ $SLUG_PATTERN ]]; then
              echo "Invalid branch name: $BRANCH_NAME"
              echo "feat/fix/hotfix branches need a ticket id (feat/TKT-013-short-slug) or a description slug (feat/short-slug)"
              echo "See docs/open-source/NAMING_CONVENTIONS.md"
              exit 1
            fi
          fi

      - name: Branch naming result summary
        run: |
          echo "## Branch Naming" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source branch follows enforced naming convention." >> "$GITHUB_STEP_SUMMARY"

  js-quality:
    name: JS Quality - Lint Typecheck Test Build
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request'
      || (github.event.action != 'closed' && github.event.action != 'edited')
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: 10.25.0

      - name: Setup Node.js 22 with pnpm cache
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Next.js TypeScript declarations
        run: pnpm --filter @medlens/web exec next typegen

      - name: Restore Turborepo cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Lint, typecheck, test, and build web workspace
        run: |
          pnpm exec turbo run lint typecheck test build --filter=@medlens/web...
          pnpm lint:md

      - name: Audit npm dependencies (advisory)
        continue-on-error: true
        run: pnpm audit --audit-level=high

      - name: Upload web coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/web/coverage/coverage-final.json
          flags: web
          fail_ci_if_error: false

      - name: JS quality result summary
        run: |
          echo "## JS Quality" >> "$GITHUB_STEP_SUMMARY"
          echo "- Lint, typecheck, unit tests, and build completed successfully." >> "$GITHUB_STEP_SUMMARY"

  python-quality:
    name: Python Quality - Ruff Mypy Pytest
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request'
      || (github.event.action != 'closed' && github.event.action != 'edited')
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: 10.25.0

      - name: Setup Node.js 22 with pnpm cache
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup uv runtime
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true

      - name: Install backend dependencies
        run: uv sync --directory apps/api --frozen --group dev

      - name: Restore Turborepo cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Lint, typecheck, and test API workspace
        run: pnpm exec turbo run lint typecheck test --filter=@medlens/api

      - name: Upload API coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/api/coverage.xml
          flags: api
          fail_ci_if_error: false

      - name: Python quality result summary
        run: |
          echo "## Python Quality" >> "$GITHUB_STEP_SUMMARY"
          echo "- Ruff, mypy, and unit tests completed successfully." >> "$GITHUB_STEP_SUMMARY"

  container-scan:
    name: Container Image Vulnerability Scan
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request'
      || (github.event.action != 'closed' && github.event.action != 'edited')
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          tags: medlens-api:scan
          load: true
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          tags: medlens-web:scan
          load: true
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: medlens-api:scan
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Scan web image
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: medlens-web:scan
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Container scan result summary
        run: |
          echo "## Container Image Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trivy scan completed (informational, non-blocking pending severity triage)." >> "$GITHUB_STEP_SUMMARY"

  commit-conventions:
    name: Commit And PR Convention Checks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Lint commit messages
        uses: wagoid/commitlint-github-action@f133a0d95090ef2609192b4a21f54e20af819ea9 # v6
        with:
          configFile: commitlint.config.cjs

      - name: Lint PR title semantics
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            ci
            release

      - name: Convention checks result summary
        run: |
          echo "## Commit And PR Conventions" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit messages and PR title format are compliant." >> "$GITHUB_STEP_SUMMARY"

  cleanup-merged-branch:
    name: Cleanup Merged Feature Branch
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Keep only permanent branches
        env:
          BRANCH_TO_DELETE: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
          GH_PAT: ${{ secrets.GH_PAT }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          # shellcheck source=/dev/null
          source .github/scripts/github-api.sh

          if [[ "$BRANCH_TO_DELETE" == "main" ]]; then
            echo "Skipping deletion for permanent branch: $BRANCH_TO_DELETE"
            exit 0
          fi

          if [[ "$HEAD_REPO" != "$REPO" ]]; then
            echo "Skipping cleanup: PR from fork ($HEAD_REPO)"
            exit 0
          fi

          echo "Deleting merged branch: $BRANCH_TO_DELETE"
          if github_api DELETE "/repos/${REPO}/git/refs/heads/${BRANCH_TO_DELETE}" 2>/dev/null; then
            echo "Branch deleted successfully."
          else
            echo "Branch may have already been deleted or does not exist. Continuing gracefully."
          fi

      - name: Branch cleanup summary
        run: |
          echo "## Branch Cleanup" >> "$GITHUB_STEP_SUMMARY"
          echo "- Merged feature branch cleanup completed." >> "$GITHUB_STEP_SUMMARY"

  # release.yml and deploy.yml are separate files (separation of concerns:
  # quality gating vs. release vs. deploy are distinct responsibilities) but
  # are invoked here as reusable workflows (`workflow_call`) with `needs:`,
  # not via `workflow_run` event-chaining. workflow_run silently no-ops if
  # the upstream run is cancelled (observed in production — see
  # docs/open-source/RELEASE_PROCESS.md); a `needs:` dependency on a
  # `workflow_call` job cannot silently miss like that, since it's a direct
  # synchronous part of this same workflow run.
  # Release is manual-trigger only (workflow_dispatch), not automatic on
  # every push to main. Quality checks still run automatically on push --
  # that feedback loop stays useful even when nothing is release-ready yet.
  # Run a release with: gh workflow run ci.yml
  release:
    name: Release
    needs: [js-quality, python-quality, container-scan]
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/release.yml
    permissions:
      contents: write
      issues: write
      pull-requests: write
    secrets: inherit

  deploy:
    name: Deploy
    needs: [release]
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
    secrets: inherit
