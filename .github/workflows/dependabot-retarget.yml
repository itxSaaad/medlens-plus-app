name: Dependabot Security Retarget Guidance

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  security-pr-guidance:
    name: Guide security Dependabot PRs to develop
    runs-on: ubuntu-latest
    if: >-
      github.actor == 'dependabot[bot]'
      && github.event.pull_request.base.ref == 'main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Comment retarget instructions
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # shellcheck source=/dev/null
          source .github/scripts/github-api.sh

          BODY="## Dependabot security PR — retarget to \`develop\`

          Security updates from Dependabot always target the **default branch** (\`main\`). This repository integrates on \`develop\` first.

          **Do not merge this PR directly to \`main\`.** Choose one:

          1. **Retarget:** Edit the PR base branch to \`develop\` (GitHub UI) and merge there after CI passes, or
          2. **Cherry-pick:** Merge the dependency bump on \`develop\` via a manual branch/PR, or
          3. **Wait:** After the next promotion, if \`develop\` and \`main\` are aligned, open a version update on \`develop\` instead.

          See \`docs/open-source/TOOLING_SETUP.md#dependabot-dependency-updates\`.
          "

          github_api POST "/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            -H "Content-Type: application/json" \
            --data-binary "$(jq -n --arg body "$BODY" '{body: $body}')"

          github_api POST "/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/labels" \
            -H "Content-Type: application/json" \
            --data-binary '["dependabot-security","needs-retarget"]' \
            2>/dev/null || echo "Labels dependabot-security / needs-retarget may need to be created in the repo."
