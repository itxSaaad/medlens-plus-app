name: Release - Semantic Versioning And Tags

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows: ["CI - Quality And Governance"]
    types: [completed]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    steps:
      - name: Checkout main branch with full history
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.25.0

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release

      - name: Release summary
        run: |
          echo "## Release" >> "$GITHUB_STEP_SUMMARY"
          echo "- semantic-release executed on main." >> "$GITHUB_STEP_SUMMARY"
          echo "- Versioning uses Conventional Commits and semantic tags (vX.Y.Z)." >> "$GITHUB_STEP_SUMMARY"
