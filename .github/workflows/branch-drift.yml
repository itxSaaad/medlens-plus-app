name: Branch Drift Detection

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  detect-drift:
    name: Detect branch drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare branch commit counts
        id: drift
        run: |
          git fetch origin develop main
          DEV_AHEAD=$(git rev-list --count origin/main..origin/develop)
          MAIN_AHEAD=$(git rev-list --count origin/develop..origin/main)
          echo "dev_ahead=$DEV_AHEAD" >> "$GITHUB_OUTPUT"
          echo "main_ahead=$MAIN_AHEAD" >> "$GITHUB_OUTPUT"
          if [ "$DEV_AHEAD" -gt 0 ] || [ "$MAIN_AHEAD" -gt 0 ]; then
            echo "drift=true" >> "$GITHUB_OUTPUT"
          else
            echo "drift=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update drift issue
        if: steps.drift.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          DEV_AHEAD: ${{ steps.drift.outputs.dev_ahead }}
          MAIN_AHEAD: ${{ steps.drift.outputs.main_ahead }}
        run: |
          TITLE="Branch sync required"
          BODY="## Branch drift detected

          - \`develop\` is **${DEV_AHEAD}** commit(s) ahead of \`main\` (unpromoted work)
          - \`main\` is **${MAIN_AHEAD}** commit(s) ahead of \`develop\` (needs backmerge)

          ### What to do (manual PRs only)

          1. **Promotion:** if \`develop\` is ahead, open and merge PR \`develop\` → \`main\` (see \`docs/open-source/BRANCHING_STRATEGY.md\`).
          2. **Backmerge:** if \`main\` is ahead, open and merge PR \`main\` → \`develop\` manually (see \`docs/open-source/BRANCHING_STRATEGY.md\`).
          3. No workflow merges branches for you — review, resolve conflicts, and merge each PR manually.
          "
          EXISTING=$(gh issue list --search "repo:${{ github.repository }} in:title \"$TITLE\" state:open" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
            echo "Updated issue #$EXISTING"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label "type:story" --label "priority:P1"
          fi
