name: Branch Drift Detection

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-drift:
    name: Detect branch drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Compare branch state
        id: drift
        run: |
          git fetch origin develop main
          EVAL=$(bash .github/scripts/evaluate-branch-sync.sh origin/main origin/develop)
          while IFS= read -r line; do
            echo "$line" >> "$GITHUB_OUTPUT"
          done <<< "$EVAL"
          STATE=$(echo "$EVAL" | grep '^drift_state=' | cut -d= -f2)
          echo "state=$STATE" >> "$GITHUB_OUTPUT"

      - name: Close drift issue when aligned
        if: steps.drift.outputs.aligned == 'true'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # shellcheck source=/dev/null
          source .github/scripts/github-api.sh

          TITLE="Branch sync required"
          ENCODED_TITLE=$(printf '%s' "$TITLE" | jq -sRr @uri)
          EXISTING=$(github_api GET "/search/issues?q=repo:${GITHUB_REPOSITORY}+is:open+in:title+${ENCODED_TITLE}" \
            | jq -r '.items[0].number // empty')

          if [ -n "$EXISTING" ]; then
            github_api PATCH "/repos/${GITHUB_REPOSITORY}/issues/${EXISTING}" \
              -H "Content-Type: application/json" \
              --data-binary '{"state":"closed","state_reason":"completed"}'
            github_api POST "/repos/${GITHUB_REPOSITORY}/issues/${EXISTING}/comments" \
              -H "Content-Type: application/json" \
              --data-binary '{"body":"Branches are aligned at the same commit. No action required."}'
            echo "Closed issue #${EXISTING}"
          else
            echo "No open drift issue to close."
          fi

      - name: Open or update drift issue
        if: steps.drift.outputs.drift == 'true'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          DEV_AHEAD: ${{ steps.drift.outputs.dev_ahead }}
          MAIN_AHEAD: ${{ steps.drift.outputs.main_ahead }}
          STATE: ${{ steps.drift.outputs.state }}
          TREES_MATCH: ${{ steps.drift.outputs.trees_match }}
        run: |
          # shellcheck source=/dev/null
          source .github/scripts/github-api.sh

          TITLE="Branch sync required"
          ENCODED_TITLE=$(printf '%s' "$TITLE" | jq -sRr @uri)

          case "$STATE" in
            graph_only)
              ACTION="**Graph-only drift** (file trees match; commit SHAs differ). [\`sync-develop.yml\`](.github/workflows/sync-develop.yml) opens/updates a \`main\` -> \`develop\` PR on every push to \`main\`. Merge it with **Create a merge commit** (never squash) — see \`docs/open-source/BRANCHING_STRATEGY.md\`."
              ;;
            promotion_needed)
              ACTION="**Promotion needed:** \`develop\` is ahead with unpromoted work. Open PR \`develop\` → \`main\` (see \`docs/open-source/BRANCHING_STRATEGY.md\`)."
              ;;
            hotfix_needed)
              ACTION="**Hotfix propagation needed:** \`main\` is ahead with changes not on \`develop\`. Merge the open \`main\` → \`develop\` hotfix PR or wait for [\`sync-develop.yml\`](.github/workflows/sync-develop.yml) to open one."
              ;;
            *)
              ACTION="**Mixed drift:** review both promotion and hotfix propagation steps in \`docs/open-source/BRANCHING_STRATEGY.md\`."
              ;;
          esac

          BODY="## Branch drift detected

          - \`develop\` is **${DEV_AHEAD}** commit(s) ahead of \`main\`
          - \`main\` is **${MAIN_AHEAD}** commit(s) ahead of \`develop\`
          - File trees match: **${TREES_MATCH}**

          ### Recommended action

          ${ACTION}
          "

          EXISTING=$(github_api GET "/search/issues?q=repo:${GITHUB_REPOSITORY}+is:open+in:title+${ENCODED_TITLE}" \
            | jq -r '.items[0].number // empty')

          if [ -n "$EXISTING" ]; then
            github_api POST "/repos/${GITHUB_REPOSITORY}/issues/${EXISTING}/comments" \
              -H "Content-Type: application/json" \
              --data-binary "$(jq -n --arg body "$BODY" '{body: $body}')"
            echo "Updated issue #${EXISTING}"
          else
            CREATE_PAYLOAD=$(jq -n \
              --arg title "$TITLE" \
              --arg body "$BODY" \
              '{title: $title, body: $body, labels: ["type:story", "priority:P1"]}')
            ISSUE=$(github_api POST "/repos/${GITHUB_REPOSITORY}/issues" \
              -H "Content-Type: application/json" \
              --data-binary "$CREATE_PAYLOAD")
            echo "Created issue #$(echo "$ISSUE" | jq -r '.number')"
          fi
