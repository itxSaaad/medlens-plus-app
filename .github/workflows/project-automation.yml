name: Project Status Automation

on:
  pull_request:
    types: [opened, reopened, ready_for_review, closed]
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  update-project-status:
    name: Sync PR state to project Status
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Resolve linked issue number
        id: issue
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Match only real issue links (line-start), not PR template examples like `Closes #42`.
          ISSUE=$(
            { printf '%s\n' "$PR_BODY"; printf '%s\n' "$PR_TITLE"; } \
              | grep -oiE '^[[:space:]]*(closes|fixes|resolves)[[:space:]]+#[0-9]+' \
              | head -1 \
              | grep -oE '[0-9]+' \
              || true
          )
          if [ -z "$ISSUE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "number=$ISSUE" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set project Status field
        if: steps.issue.outputs.skip != 'true'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
        run: |
          if [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
            STATUS="Done"
          else
            STATUS="In Review"
          fi
          export STATUS
          bash .github/scripts/update-project-status.sh
