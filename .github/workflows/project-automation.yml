name: Project Status Automation

on:
  pull_request:
    types: [opened, reopened, ready_for_review, closed]
    branches: [develop, main]

permissions:
  contents: read
  issues: write
  pull-requests: read
  projects: write

jobs:
  update-project-status:
    name: Sync PR state to project Status
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Resolve linked issue number
        id: issue
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Match only real issue links (line-start), not PR template examples like `Closes #42`.
          ISSUE=$(
            { printf '%s\n' "$PR_BODY"; printf '%s\n' "$PR_TITLE"; } \
              | grep -oiE '^[[:space:]]*(closes|fixes|resolves)[[:space:]]+#[0-9]+' \
              | head -1 \
              | grep -oE '[0-9]+' \
              || true
          )
          if [ -z "$ISSUE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "number=$ISSUE" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set project Status field
        if: steps.issue.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
          PROJECT_ID: PVT_kwHOBkWrfs4Banf5
          STATUS_FIELD: PVTSSF_lAHOBkWrfs4Banf5zhVdy1s
        run: |
          if [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
            STATUS="Done"
          else
            STATUS="In Review"
          fi

          ITEM_ID=$(gh project item-list 2 --owner itxSaaad --format json --limit 100 | jq -r --arg n "$ISSUE_NUMBER" '.items[] | select(.content.number == ($n|tonumber)) | .id' | head -1)
          if [ -z "$ITEM_ID" ]; then
            echo "No project item for issue #$ISSUE_NUMBER"
            exit 0
          fi

          OPTION_ID=$(gh project field-list 2 --owner itxSaaad --format json | jq -r --arg s "$STATUS" '.fields[] | select(.name=="Status") | .options[] | select(.name==$s) | .id')
          if [ -z "$OPTION_ID" ]; then
            echo "Status option not found: $STATUS"
            exit 0
          fi

          gh project item-edit --id "$ITEM_ID" --project-id "$PROJECT_ID" --field-id "$STATUS_FIELD" --single-select-option-id "$OPTION_ID"
          echo "Set issue #$ISSUE_NUMBER project Status to $STATUS"
