version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    target-branch: main
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      monorepo-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - chore

  - package-ecosystem: pip
    directory: "/apps/api"
    target-branch: main
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - chore

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: main
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
