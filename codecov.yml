coverage:
  status:
    project:
      default:
        target: 70%
        threshold: 2%
    patch:
      default:
        target: 60%
  flags:
    web:
      paths:
        - apps/web/
    api:
      paths:
        - apps/api/
  ignore:
    - "**/tests/**"
    - "**/*.test.*"
    - "**/*.spec.*"
    - "graphify-out/**"
    - ".cursor/**"
    - ".husky/graphify-update.sh"
    - ".claude/skills/graphify/**"
    - "**/.graphify_*"
    - "**/node_modules/**"
    - "**/.next/**"
    - "**/dist/**"
    - "**/.venv/**"
    - "**/__pycache__/**"

comment:
  layout: reach,diff,flags,files
  behavior: default
