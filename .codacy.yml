---
exclude_paths:
  - "graphify-out/**"
  - ".cursor/**"
  - ".husky/graphify-update.sh"
  - ".claude/skills/graphify/**"
  - "**/.graphify_*"
  - "**/node_modules/**"
  - "**/.next/**"
  - "**/coverage/**"
  - "**/dist/**"
  - "**/.venv/**"
  - "**/__pycache__/**"
  - "**/.uv-cache/**"
  - "**/pnpm-lock.yaml"

engines:
  duplication:
    minThreshold: 5
    threshold: 10
  markdownlint:
    exclude_paths:
      - "graphify-out/**"
      - ".cursor/**"
      - ".claude/skills/graphify/**"
      - "**/node_modules/**"
